; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; ===== QUAN TRỌNG: Cấu hình Build Flags =====
build_flags = 
    ; Tăng stack size cho loop task
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    
    ; Tăng watchdog timeout (mặc định 5s -> 10s)
    -D CONFIG_ESP_TASK_WDT_TIMEOUT_S=10
    
    ; Tối ưu hóa cho stability
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    
    ; Firebase optimization
    -D FIREBASE_USE_PSRAM=0
    -D FIREBASE_ENABLE_RTDB=1
    -D FIREBASE_ENABLE_FCM=0
    -D FIREBASE_ENABLE_FIRESTORE=0
    -D FIREBASE_ENABLE_STORAGE=0
    
    ; WiFi optimization
    -D CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=32
    -D CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=16

; Tối ưu build - Thay -Os bằng -O2 để ổn định hơn
build_unflags = -Os

; Monitor settings
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time

; Upload settings
upload_speed = 921600

; Thư viện cần thiết
lib_deps = 
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.3
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.14

; Partition scheme để có nhiều RAM hơn
board_build.partitions = min_spiffs.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
